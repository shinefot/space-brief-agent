name: Weekly Orbital Brief

on:
  schedule:
    # 13:00 UTC every Monday (08:00 US Central). Adjust as you like.
    - cron: "0 13 * * 1"
  workflow_dispatch:        # lets you trigger a run manually from the Actions tab
    inputs:
      dry_run:
        description: "Dry run (no email, no state write)"
        type: boolean
        default: false

permissions:
  contents: write           # needed to commit state + briefings back

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL_SCORE: ${{ vars.MODEL_SCORE }}
          MODEL_ANALYZE: ${{ vars.MODEL_ANALYZE }}
          MODEL_SYNTHESIZE: ${{ vars.MODEL_SYNTHESIZE }}
          LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS }}
          MIN_SIGNIFICANCE: ${{ vars.MIN_SIGNIFICANCE }}
          LL2_API_KEY: ${{ secrets.LL2_API_KEY }}
          SPACETRACK_USER: ${{ secrets.SPACETRACK_USER }}
          SPACETRACK_PASS: ${{ secrets.SPACETRACK_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python run.py --dry-run
          else
            python run.py
          fi

      - name: Commit state & archive
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name  "orbital-brief-bot"
          git config user.email "actions@github.com"
          git add state/ briefings/ || true
          if ! git diff --cached --quiet; then
            git commit -m "Brief + state update $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No state changes to commit."
          fi

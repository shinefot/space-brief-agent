# =============================================================================
# Space Brief Agent — Source Registry & Editorial Scope
# Everything the agent "knows about" lives here. Edit this file to tune the
# briefing; the code is generic.
# =============================================================================

# -- Mission statement injected into every LLM prompt so scoring/analysis stay on-thesis.
scope: >
  A weekly intelligence briefing on the orbital-space industry in the United States
  and China, written for a reader who works in technology strategy AND U.S.
  defense/national-security. The editorial thesis is "space maneuver and logistics,
  read through a dual-use lens." Prioritize: orbital transfer vehicles, space tugs,
  kick stages and reusable heavy-lift (movers); in-orbit servicing, assembly and
  manufacturing (ISAM) — refueling, docking, life-extension, debris removal; and
  rendezvous & proximity operations (RPO). For every commercial development, assess
  the dual-use / national-security implication (e.g. a commercial refueling tug is
  also a co-orbital inspection/grappling capability). Maintain a direct U.S.-vs-China
  ledger to map asymmetric capability. De-prioritize: consumer space tourism,
  generic astronomy/science-mission PR, and routine financing news with no
  capability signal.

# -- Pillars. The 'id' is referenced in code; 'guidance' is fed to the LLM.
pillars:
  - id: transport
    name: "Transport / Movers"
    guidance: >
      OTVs, space tugs, kick stages, last-mile orbital delivery, and reusable
      heavy-lift used as a mover. Treat launch cadence itself as context, not a
      headline, unless a new vehicle/capability debuts.
  - id: isam
    name: "In-Orbit Servicing & Infrastructure (ISAM)"
    guidance: >
      Refueling, docking/berthing mechanisms, life-extension, robotic servicing,
      debris removal, in-space assembly/manufacturing, and orbital depots/stations.
  - id: dualuse
    name: "Dual-Use & Defense Read"
    guidance: >
      The national-security interpretation: RPO, responsive/tactically-responsive
      space, on-orbit maneuver warfare, space domain awareness, counterspace, and
      how a given commercial capability maps to a military one. THIS is where the
      U.S.-vs-China asymmetry analysis lives.
  - id: context
    name: "Access & Constellations (context)"
    guidance: >
      Thin background layer: notable launch-access shifts and megaconstellation
      deployment progress (Guowang, Qianfan/G60 vs Starlink/Starshield). Mostly
      auto-generated from the launch API; only surface as a headline on a real shift.

# -- Entity watchlists. Used to bias relevance scoring and to key the asymmetry ledger.
entities:
  US:
    transport:  [SpaceX, Blue Origin, Impulse Space, Rocket Lab, Firefly Aerospace, ULA, Stoke Space]
    isam:       ["Northrop Grumman SpaceLogistics", Starfish Space, Orbit Fab, "Astroscale U.S.", Katalyst Space, Arkisys, Gravitics, "Vast"]
    dualuse:    ["U.S. Space Force", "Space Systems Command", DARPA, "Space Development Agency", "Space RCO", NASA OSAM]
  CN:
    transport:  ["Space Pioneer (Tianbing)", Galactic Energy, LandSpace, "iSpace (Interstellar Glory)", Orienspace, "CAS Space", "Deep Blue Aerospace", CASC, CASIC]
    isam:       ["Shijian fleet (SJ-21/SJ-25)", "Origin Space", "China Satellite Network (Guowang)"]
    dualuse:    ["PLA Aerospace Force", "Shiyan series", "Shijian series", CNSA]


# -- Web-search seed queries for gap-filling (used by the optional search step).
#    Keep tight and capability-focused.
search_seeds:
  - "China satellite refueling OR on-orbit servicing demonstration"
  - "Shijian-25 OR Shijian-21 rendezvous proximity operations"
  - "orbital transfer vehicle OR space tug contract award"
  - "Space Force dynamic space operations OR responsive space"
  - "Guowang OR Qianfan megaconstellation deployment"

# -- Launch Library 2 launch-context settings.
launch_context:
  enabled: true
  # Map LL2 launch-service-provider country codes we care about.
  countries: [USA, CHN]
  max_launches: 60

# -- Orbital tasking signal (RPO / maneuver detection from Space-Track GP data).
#    Requires SPACETRACK_USER / SPACETRACK_PASS env vars and the sgp4/spacetrack
#    libraries. Degrades gracefully if unavailable. NORAD IDs below are PLACEHOLDERS
#    — confirm current catalog numbers before relying on them (see README).
orbital:
  enabled: false                  # flip to true once you've set credentials + watchlist
  window_hours: 72                # how far forward to propagate
  step_minutes: 10                # propagation time step
  proximity_range_km: 75          # flag sustained separation at or below this
  proximity_rel_velocity_ms: 200  # ...AND relative velocity at or below this (station-keeping)
  maneuver_delta_a_km: 2.0         # flag semi-major-axis step changes vs last run
  event_significance: 4           # significance assigned to orbital events (1-5)
  watchlist:
    # name is for the brief; norad_id is what's queried. VERIFY these IDs.
    - {name: "Shijian-21", norad_id: 48809}
    - {name: "Shijian-25", norad_id: 0}        # fill in once cataloged
    - {name: "MEV-1 (Northrop)", norad_id: 44625}
    - {name: "MEV-2 (Northrop)", norad_id: 47502}
